name: Atualizar resultados Mundial 2026

on:
  schedule:
    # Todos os dias às 08:00 UTC (09:00/10:00 em Portugal, dependendo da hora de verão)
    - cron: "15 * * * *"
  workflow_dispatch: {}   # permite correr manualmente no GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Atualizar resultados
        run: python3 update_results.py

      - name: Commit e push se houve alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Atualização automática dos resultados ($(date -u +%Y-%m-%d))"
          git push
